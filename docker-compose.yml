version: "3.9"

services:
  cypherqube:
    build:
      context: .
      dockerfile: Dockerfile
    image: cypherqube:latest
    container_name: cypherqube_app
    ports:
      - "8501:8501"
    volumes:
      # Persist generated reports outside the container
      - ./reports:/app/reports
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    restart: unless-stopped

  # Separate service to run the test suite inside Docker
  test:
    build:
      context: .
      dockerfile: Dockerfile
    image: cypherqube:latest
    container_name: cypherqube_tests
    command: ["pytest", "tests/", "-v", "--cov=.", "--cov-report=term-missing"]
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    profiles:
      # Only runs when explicitly called:  docker compose --profile test up test
      - test