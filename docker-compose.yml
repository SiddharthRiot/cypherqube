services:
  cypherqube:
    build:
      context: .
      dockerfile: Dockerfile
    image: cypherqube:latest
    container_name: cypherqube
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  test:
    build:
      context: .
      dockerfile: Dockerfile
    image: cypherqube:latest
    container_name: cypherqube-test
    command: >
      python -m pytest tests/ -v --tb=short
    environment:
      - PYTHONUNBUFFERED=1
    profiles:
      - test
